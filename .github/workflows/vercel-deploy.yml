# Optional: deploy the Next.js app in web/ without using Vercel's Git integration.
# If the repo is already connected in the Vercel dashboard (recommended), you do not need this workflow.
#
# Required repository secrets (Vercel → Project → Settings → General):
#   VERCEL_TOKEN        — create at https://vercel.com/account/tokens
#   VERCEL_ORG_ID       — Team / Personal ID (same page as below)
#   VERCEL_PROJECT_ID   — Project ID
#
# Find ORG_ID and PROJECT_ID: Project Settings → General, or run `npx vercel link` locally in web/.

name: Deploy web to Vercel

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
