name: Deploy web to GitHub Pages

# The deploy job fails with HTTP 404 until GitHub Pages is enabled for this repo
# (Settings → Pages → Build and deployment → GitHub Actions). To avoid failing every
# push to main before that, the deploy step is gated:
#   • Manual "Run workflow" always runs build + deploy (use after Pages is enabled).
#   • On push: deploy runs only if repository variable GITHUB_PAGES_DEPLOY == "true"
#     (Settings → Secrets and variables → Actions → Variables).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        env:
          # Project Pages URL: https://<owner>.github.io/<repo>/
          NEXT_OUTPUT_MODE: export
          NEXT_PUBLIC_BASE_PATH: /applypilot.ai
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    if: github.event_name == 'workflow_dispatch' || vars.GITHUB_PAGES_DEPLOY == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Verify GitHub Pages is enabled (API)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          url="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          code=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$url")
          if [ "$code" = "404" ]; then
            echo "::error::GitHub Pages is not enabled for this repository. Open Settings → Pages → Build and deployment, choose Source: GitHub Actions, save, then re-run this workflow."
            echo "Docs: https://docs.github.com/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site"
            exit 1
          fi
          if [ "$code" != "200" ]; then
            echo "::error::Unexpected response from GitHub Pages API (HTTP ${code})."
            cat /tmp/pages.json || true
            exit 1
          fi
          echo "GitHub Pages is enabled for this repository."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
